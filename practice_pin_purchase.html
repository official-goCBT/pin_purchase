<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛒goCBT |PIN Purchase</title>
    <style>
        :root {
            --primary: #38bdf8; --accent: #f59e0b; --bg-dark: #0f172a;
            --card-bg: #1e293b; --text-main: #f8fafc; --text-dim: #94a3b8;
            --success: #22c55e; --danger: #ef4444;
        }
        body { 
            background: var(--bg-dark); color: var(--text-main); 
            font-family: 'Inter', system-ui, sans-serif; margin: 0; 
            overflow-x: hidden; user-select: none; -webkit-user-select: none;
        }
        .page-container { width: 100%; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .hidden { display: none !important; }
        .card { background: var(--card-bg); padding: 30px; border-radius: 16px; width: 100%; max-width: 550px; box-shadow: 0 20px 25px rgba(0,0,0,0.4); border: 1px solid #334155; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; font-size: 1rem; }
        .btn-primary { background: var(--primary); color: #0f172a; }
        .btn-primary:hover { background: #7dd3fc; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        label { font-size: 0.85rem; color: var(--text-dim); font-weight: 600; }
        .price-tag { font-size: 2.2rem; color: var(--accent); font-weight: 800; text-align: center; margin: 10px 0; }
        .pin-card {
            position: relative;
            width: 100%;
            background: var(--card-bg) url('pin-card.png') center/cover no-repeat;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            margin: 20px 0;
        }
        .pin-card.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .pin-card.amount-200 { border: 2px solid #22c55e; }
        .pin-card.amount-500 { border: 2px solid #38bdf8; }
        .pin-card.amount-1000 { border: 2px solid #f59e0b; }
        .pin-number {
            filter: blur(5px);
            letter-spacing: 2px;
            font-size: 1.25rem;
            margin-top: 10px;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="page-purchase" class="page-container">
        <div class="card">
            <h2 style="text-align: center; margin: 0 0 20px; color: var(--primary);">🛒Study PIN Purchase</h2>
            <label>Class/Level</label>
            <select id="p-class" onchange="updateSubjectsByClass()">
                <option value="">--Select Class--</option>
                <option value="JSS1">JSS 1</option>
                <option value="JSS2">JSS 2</option>
                <option value="JSS3">JSS 3</option>
                <option value="SSS1">SSS 1</option>
                <option value="SSS2">SSS 2</option>
                <option value="SSS3">SSS 3</option>
            </select>
            <label>Practice Subject</label>
            <select id="p-subject">
                <option value="">--Select Subject--</option>
            </select>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <div style="grid-column: 1 / -1;">
                    <label>PIN Amount(₦)</label>
                    <select id="p-type" onchange="updatePurchaseUI()">
                        <option value="">Select Amount</option>
                        <option value="Exam PIN" data-price="200">₦200</option>
                        <option value="Study PIN" data-price="500">₦500</option>
                        <option value="Result Checker" data-price="1000">₦1,000</option>
                    </select>
                </div>
                <div id="virtual-card" class="pin-card hidden">
                    <div class="price-tag" id="display-price">₦0.00</div>
                    <div class="pin-number" id="card-pin">**** **** ****</div>
                </div>
                <div style="grid-column: 1 / -1;">
                    <label>Payment Mode</label>
                    <select id="p-method" onchange="togglePaymentDetails()">
                        <option value="Bank">Bank Transfer</option>
                        <option value="Vendor">OPay Vendor</option>
                        <option value="eTranzact">eTranzact</option>
                    </select>
                </div>
            </div>
            <label>Delivery WhatsApp Number</label>
            <input type="tel" id="p-whatsapp" placeholder="e.g. 08012345678">
            
            <div id="payment-info" style="background: #0f172a; padding: 15px; border-radius: 8px; border: 1px solid #334155; margin-bottom: 15px;">
                <div id="bank-ui">
                    <small style="color:var(--text-dim)">GTBank Transfer:</small>
                    <p style="margin: 5px 0;"><b>0265544737</b></p>
                    <p style="margin:0; font-size: 0.8rem; opacity: 0.7;">DigitalSolution Assessments</p>
                </div>
                <div id="vendor-ui" class="hidden">
                    <small style="color:var(--text-dim)">OPay Vendor:</small>
                    <p style="margin: 5px 0;"><b>8068076333</b></p>
                    <p style="margin:0; font-size: 0.8rem; opacity: 0.7;">Recipient: Godwin</p>
                </div>
                <div id="etranzact-ui" class="hidden">
                    <small style="color:var(--text-dim)">eTranzact Payment:</small>
                    <p style="margin: 5px 0; color: var(--primary);"><b>esther.nwogwu@etranzactng.com</b></p>
                    <p style="margin:0; font-size: 0.8rem; opacity: 0.7;">Send payment notification to this email</p>
                </div>
            </div>

            <button class="btn-primary" onclick="handleWhatsAppRedirect()">Proceed to WhatsApp Delivery</button>
            <button class="btn-outline" onclick="window.location.href='https://official-gocbt.github.io/pin_purchase/'">Back</button>
        </div>
    </div>

    <script>
        const sssSubjects = [
            'English Language', 'General Mathematics', 'Citizenship and Heritage Studies',
            'Digital Technologies', 'Biology', 'Chemistry', 'Physics', 'Agricultural Science',
            'Further Mathematics', 'Physical Education', 'Health Education', 'Foods & Nutrition',
            'Geography', 'Technical Drawing', 'Humanities', 'Nigerian History', 'Government',
            'Christian Religious Studies (CRS)', 'Islamic Studies (IRS)', 'French', 'Arabic',
            'Visual Arts', 'Music', 'Literature in English', 'Home Management', 'Catering Craft',
            'Business Studies', 'Accounting', 'Commerce', 'Marketing', 'Economics', 'Programming/AI'
        ];

        const classSubjects = {
            'JSS1': ['COMPUTER STUDY', 'BUSINESS STUDY', 'DIGITAL TECHNOLOGY', 'ENGLISH LANGUAGE', 'MATHEMATICS', 'BASIC SCIENCE', 'FRENCH'],
            'JSS2': ['COMPUTER STUDY', 'BUSINESS STUDY', 'DIGITAL TECHNOLOGY', 'ENGLISH LANGUAGE', 'MATHEMATICS', 'BASIC SCIENCE', 'FRENCH'],
            'JSS3': ['COMPUTER STUDY', 'BUSINESS STUDY', 'DIGITAL TECHNOLOGY', 'ENGLISH LANGUAGE', 'MATHEMATICS', 'BASIC SCIENCE', 'FRENCH'],
            'SSS1': sssSubjects, 'SSS2': sssSubjects, 'SSS3': sssSubjects
        };

        function updateSubjectsByClass() {
            const classVal = document.getElementById('p-class').value;
            const subjectSel = document.getElementById('p-subject');
            subjectSel.innerHTML = '<option value="">--Select Subject--</option>';
            if (classVal && classSubjects[classVal]) {
                classSubjects[classVal].forEach(subject => {
                    const opt = document.createElement('option');
                    opt.value = subject;
                    opt.textContent = subject;
                    subjectSel.appendChild(opt);
                });
            }
        }

        const DB = {
            init: () => {
                if (!localStorage.getItem('nexus_cbt_core')) {
                    localStorage.setItem('nexus_cbt_core', JSON.stringify({ students: [] }));
                }
            }
        };

        function updatePurchaseUI() {
            const sel = document.getElementById('p-type');
            const price = parseInt(sel.options[sel.selectedIndex].dataset.price) || 0;
            const disp = document.getElementById('display-price');
            if (disp) disp.innerText = `₦${price.toLocaleString()}.00`;
            updatePinCard();
        }

        function generateRandomPin() {
            return Array.from({length: 3}, () => Math.floor(1000 + Math.random() * 9000)).join(' ');
        }

        function updatePinCard() {
            const sel = document.getElementById('p-type');
            const card = document.getElementById('virtual-card');
            const pinText = document.getElementById('card-pin');
            if (sel.value) {
                card.classList.remove('hidden');
                setTimeout(() => card.classList.add('show'), 10);
                pinText.textContent = generateRandomPin();
            } else {
                card.classList.add('hidden');
                card.classList.remove('show');
            }
        }

        function togglePaymentDetails() {
            const m = document.getElementById('p-method').value;
            document.getElementById('bank-ui').classList.toggle('hidden', m !== 'Bank');
            document.getElementById('vendor-ui').classList.toggle('hidden', m !== 'Vendor');
            document.getElementById('etranzact-ui').classList.toggle('hidden', m !== 'eTranzact');
        }

        function handleWhatsAppRedirect() {
            const phone = document.getElementById('p-whatsapp').value.trim();
            if (!phone) return alert('Enter phone.');
            const subject = document.getElementById('p-subject').value;
            const pinType = document.getElementById('p-type').value;
            const method = document.getElementById('p-method').value;
            const price = document.getElementById('p-type').options[document.getElementById('p-type').selectedIndex].dataset.price;
            
            const message = `Order PIN Request:\nPhone: ${phone}\nSubject: ${subject}\nAmount: ₦${price}\nPayment Method: ${method}`;
            window.open(`https://wa.me/2348157505037?text=${encodeURIComponent(message)}`, '_blank');
        }

        DB.init();
        updatePurchaseUI();
        togglePaymentDetails();
    </script>
</body>
</html>
